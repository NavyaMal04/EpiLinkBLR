name: epilink_blr
description: "EpiLink BLR disease outbreak surveillance system."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # Navigation
  go_router: ^13.2.0
  
  # Hardware & Permissions
  image_picker: ^1.0.7
  permission_handler: ^11.3.0
  camera: ^0.10.5+9
  
  # Maps & Location
  google_maps_flutter: ^2.5.3
  google_places_flutter: ^2.0.7
  geolocator: ^11.0.0
  geocoding: ^3.0.0
  
  # Firebase
  firebase_core: ^2.24.2
  cloud_firestore: ^4.14.0
  firebase_auth: ^4.16.0
  firebase_messaging: ^14.7.10
  firebase_storage: ^11.6.0
  
  # Local storage
  drift: ^2.14.1
  sqlite3_flutter_libs: ^0.5.18
  path_provider: ^2.1.2
  path: ^1.9.0
  
  # TFLite
  tflite_flutter: ^0.12.1
  image: ^4.1.3
  
  # Utilities
  uuid: ^4.3.3
  connectivity_plus: ^5.0.2
  provider: ^6.1.1
  cached_network_image: ^3.3.1
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  drift_dev: ^2.14.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/models/mrdt_classifier.tflite
    - assets/models/model_metadata.json
